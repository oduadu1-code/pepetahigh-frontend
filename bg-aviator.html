<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Aviator Engine · Background</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#eef0ff;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:16px}
.card{background:#0f1018;border:1px solid #252740;border-radius:12px;padding:20px 24px;width:100%;max-width:360px;text-align:center}
.icon{font-size:2rem;margin-bottom:10px}
.title{font-size:.85rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#6c88ff;margin-bottom:14px}
.row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1b1d2e;font-size:.72rem}
.row:last-child{border-bottom:none}
.row-lbl{color:#4a4f7a;letter-spacing:.06em;text-transform:uppercase}
.row-val{font-weight:700}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle}
.dot-green{background:#29d980;box-shadow:0 0 8px #29d980;animation:pulse 1.2s ease infinite}
.dot-gold{background:#f5c542;box-shadow:0 0 8px #f5c542;animation:pulse 1.2s ease infinite}
.dot-red{background:#f24e4e}
.dot-idle{background:#4a4f7a}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.status-row{display:flex;align-items:center;justify-content:center;font-size:.78rem;margin-top:14px;gap:6px}
.note{font-size:.6rem;color:#4a4f7a;margin-top:10px;line-height:1.6}
</style>
</head>
<body>

<div class="card">
  <div class="icon">✈</div>
  <div class="title">Aviator Prediction Engine</div>
  <div class="row"><span class="row-lbl">Status</span><span class="row-val" id="statusVal" style="color:#4a4f7a">Starting…</span></div>
  <div class="row"><span class="row-lbl">State</span><span class="row-val" id="stateVal" style="color:#4a4f7a">—</span></div>
  <div class="row"><span class="row-lbl">Next Crash</span><span class="row-val" id="crashVal" style="color:#4a4f7a">—</span></div>
  <div class="row"><span class="row-lbl">Live Mult</span><span class="row-val" id="multVal" style="color:#4a4f7a">—</span></div>
  <div class="row"><span class="row-lbl">Round</span><span class="row-val" id="roundVal" style="color:#4a4f7a">—</span></div>
  <div class="row"><span class="row-lbl">Broadcast</span><span class="row-val" id="broadVal" style="color:#4a4f7a">—</span></div>
  <div class="status-row">
    <span class="dot dot-idle" id="statusDot"></span>
    <span id="statusLbl" style="color:#4a4f7a">Initialising…</span>
  </div>
  <div class="note">Keep this window open in the background.<br>The admin predictor reads data from this engine.</div>
</div>

<script>
'use strict';
// ── Stubs so engine.js + utils.js load cleanly in popup context ──────
// engine.js calls PH.getMode() to decide which crash generator to use.
// We always return 'real' so it uses genCrashReal() — matching live game.
window.PH = {
  getMode:    () => 'real',
  getUser:    () => null,
  setUser:    () => {},
  clearUser:  () => {},
  getWallet:  () => 0,
  setWallet:  () => {},
  getDemoBal: () => 5000,
  setDemoBal: () => {},
  resetDemo:  () => {},
  balance:    () => 0,
  deduct:     () => {},
  credit:     () => {},
  saveTxn:    () => {},
  getTxns:    () => [],
  fmt:        v  => 'KSh ' + parseFloat(v||0).toFixed(2),
};
window.updateNavBal = () => {};
window.PlayerCount  = { next: () => 80, get: () => 80 };
// Fallback stubs — utils.js will overwrite these with real implementations
if (typeof window.fakeName    === 'undefined') window.fakeName    = () => '254' + String(Math.floor(Math.random()*9e6+1e6));
if (typeof window.maskName    === 'undefined') window.maskName    = n  => n ? n[0]+'***'+n[n.length-1] : '?***?';
if (typeof window.fakeInitial === 'undefined') window.fakeInitial = n  => ((n||'?')[0]).toUpperCase();
</script>

<!-- utils.js defines PH helpers, fakeName, maskName, fakeInitial, showToast -->
<script src="utils.js"></script>

<!-- engine.js defines G_real, G_demo, startWorld, switchWorld, etc. -->
<script src="engine.js"></script>

<script>
(function () {
  'use strict';

  const statusEl = document.getElementById('statusVal');
  const stateEl  = document.getElementById('stateVal');
  const crashEl  = document.getElementById('crashVal');
  const multEl   = document.getElementById('multVal');
  const roundEl  = document.getElementById('roundVal');
  const broadEl  = document.getElementById('broadVal');
  const dotEl    = document.getElementById('statusDot');
  const lblEl    = document.getElementById('statusLbl');

  // Verify engine loaded
  if (!window.G_real || typeof window.startWorld !== 'function') {
    statusEl.textContent = '⚠ Engine failed to load';
    statusEl.style.color = '#f24e4e';
    console.error('[bg-aviator] engine.js did not define G_real / startWorld');
    return;
  }

  // Start only G_real — admin tracks real rounds only.
  // Both worlds are initialised by engine.js but we only run real mode here.
  startWorld(window.G_real);

  statusEl.textContent = 'Running';
  statusEl.style.color = '#29d980';

  const _stateColors = { wait:'#f5c542', fly:'#6c88ff', crash:'#f24e4e', idle:'#4a4f7a' };

  setInterval(() => {
    const G = window.G_real;
    if (!G) return;
    const state = G.state || 'idle';
    stateEl.textContent = state.charAt(0).toUpperCase() + state.slice(1);
    stateEl.style.color = _stateColors[state] || '#eef0ff';
    crashEl.textContent = (G.crashAt || 0).toFixed(2) + '×';
    crashEl.style.color = '#eef0ff';
    multEl.textContent  = (G.mult || 1).toFixed(2) + '×';
    multEl.style.color  = state === 'fly' ? '#6c88ff' : '#4a4f7a';
    roundEl.textContent = '#' + (G.roundNum || 1);
    try {
      const ls = localStorage.getItem('ph_av_sync');
      if (ls) {
        const d = JSON.parse(ls);
        const fresh = (Date.now() - (d.ts || 0)) < 500;
        broadEl.textContent = fresh ? 'Live ✓' : 'Idle';
        broadEl.style.color = fresh ? '#29d980' : '#f5c542';
        dotEl.className     = fresh ? 'dot dot-green' : 'dot dot-gold';
        lblEl.textContent   = fresh ? 'Broadcasting live' : 'Broadcast idle';
        lblEl.style.color   = fresh ? '#29d980' : '#f5c542';
      }
    } catch (e) {}
  }, 300);
})();
</script>

<!--
  bridge-aviator.js reads: parent.window.G_real
  In a popup window, parent.window === window, so it correctly reads
  window.G_real which is set by engine.js + startWorld() above.
  No changes needed to bridge-aviator.js.
-->
<script src="bridge-aviator.js"></script>

</body>
</html>
